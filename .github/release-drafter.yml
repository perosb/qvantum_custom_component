include-pre-releases: false
change-template: "- #$NUMBER $TITLE @$AUTHOR"
sort-direction: ascending
template: |
  # What's Changed

  $CHANGES


  > [!IMPORTANT]
  > By default, this integration uses Modbus for **reading only**.
  > Modbus write support is disabled unless you explicitly enable it in the integration options,
  > and only supported controls use that path. Other configuration/set commands continue to use the existing HTTP API.


  > [!WARNING]
  >The Elevate access rights works by assigning "Remote Service" access to your user.
  >Essentially it gives you service tech access.
  >This is apparently required to us to change some settings on our pumps.
  
  
  > [!CAUTION]
  >Uses the same internal API for all metrics that is also used by the app.
  >This API pulls live metrics from FLVP.
  >Use at your own risk ;)

include-labels:
  - "bug"
  - "enhancement"
  - "chore"
categories:
  - title: "New features"
    label: "enhancement"

  - title: "Bug fixes"
    label: "bug"

  - title: "Chores"
    label: "chore"
