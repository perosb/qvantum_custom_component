name: Release Drafter

on:
  push:
    branches:
      - main
      - drafter
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read

jobs:
  release-drafter:
    permissions:
      contents: write
      pull-requests: write
      issues: write

    name: Release Drafter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Get next version
        if: github.event_name == 'push'
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          scheme: calver
          increment: patch

      - name: Run Release Drafter
        if: github.event_name == 'push'
        uses: release-drafter/release-drafter@v7.1.1
        with:
          tag: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          include-pre-releases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply labels from PR title
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const number = context.payload.pull_request.number;
            let label = null;
            if (/^fix[\s(:]/i.test(title))   label = 'bug';
            else if (/^feat[\s(:]/i.test(title)) label = 'enhancement';
            else if (/^(chore|docs|refactor|test|ci)[\s(:]/i.test(title)) label = 'chore';
            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: [label],
              });
            }
